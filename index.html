<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="将 Markdown 转换为微信公众号内容的格式化工具。">
  <title>Markdown × Weixin</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;500&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&display=swap" rel="stylesheet">

  <script type="module" src="/src/main.js"></script>
  <link rel="stylesheet" href="./themes/github.css" id="codeThemeId">
  <link rel="stylesheet" id="pageThemeId">
</head>
<body>
<header class="topheader">
  <button class="drawer-toggle" aria-label="打开草稿">
    <span></span><span></span><span></span>
  </button>
  <div class="brand">
    <span class="brand-mark" aria-hidden="true">§</span>
    <div class="brand-text">
      <h1 class="brand-title">Markdown<em>×</em>Weixin</h1>
      <span class="brand-tag">公 众 号 格 式 转 换</span>
    </div>
  </div>
  <nav class="topheader-nav">
    <label class="theme-wrapper">
      <span class="theme-label">页面</span>
      <select class="page-theme"></select>
    </label>
    <label class="theme-wrapper">
      <span class="theme-label">代码</span>
      <select class="code-theme"></select>
    </label>
  </nav>
</header>
<div class="drawer-backdrop" aria-hidden="true"></div>
<aside class="docs-drawer" aria-hidden="true">
  <header class="drawer-header">
    <span class="drawer-label">DRAFTS</span>
    <span class="drawer-count">0</span>
  </header>
  <ul class="doc-list"></ul>
  <button class="drawer-new" type="button">
    <span class="new-sign">+</span>
    <span class="new-label">新 建 草 稿</span>
  </button>
</aside>
<div class="editor-toolbar">
  <button data-action="bold" aria-label="加粗"><strong>B</strong></button>
  <button data-action="italic" aria-label="斜体"><em>I</em></button>
  <span class="toolbar-divider"></span>
  <button data-action="h1" aria-label="一级标题">H1</button>
  <button data-action="h2" aria-label="二级标题">H2</button>
  <button data-action="h3" aria-label="三级标题">H3</button>
  <span class="toolbar-divider"></span>
  <button data-action="code" aria-label="行内代码">&lt;/&gt;</button>
  <button data-action="codeblock" aria-label="代码块">{ }</button>
  <button data-action="link" aria-label="插入链接">Link</button>
  <button data-action="image" aria-label="插入图片">Img</button>
  <span class="toolbar-divider"></span>
  <button data-action="quote" aria-label="引用">&ldquo;</button>
  <button data-action="ul" aria-label="无序列表">UL</button>
  <button data-action="ol" aria-label="有序列表">OL</button>
  <button data-action="clear" class="toolbar-clear" aria-label="清空内容">✕</button>
</div>
<textarea id="input" spellcheck="false"></textarea>
<div class="editor-stats">
  <span id="charCount">字数 0</span>
  <span class="stats-divider">·</span>
  <span id="lineCount">行数 0</span>
</div>
<button id="copybtn" data-clipboard-action="copy" data-clipboard-target="#outputCtt" class="btn copy-button" aria-label="复制到剪贴板">
  <span class="copy-label">复 制</span>
</button>
<div id="output">
  <div class="wrapper" id="outputCtt"></div>
</div>
<div id="snackbar">已复制到剪贴板，粘贴到微信公众号编辑器即可</div>
</body>
</html>
